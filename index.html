<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WASHMS Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #0a1929;
      --secondary: #001e3c;
      --accent: #00b4d8;
      --accent-light: #90e0ef;
    }

    body {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .login-container {
      background: rgba(0, 46, 92, 0.7);
      border: 1px solid rgba(0, 180, 216, 0.3);
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 450px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 3.5rem;
      color: var(--accent);
      margin-bottom: 15px;
      text-shadow: 0 0 15px rgba(0, 180, 216, 0.5);
    }

    .title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-light);
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
    }

    .input-field {
      width: 100%;
      padding: 15px 15px 15px 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(0, 30, 60, 0.5);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 180, 216, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      background: var(--accent-light);
      box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
    }

    .error-message {
      color: #f87171;
      text-align: center;
      margin-top: 15px;
      font-size: 0.95rem;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: rgba(230, 247, 255, 0.7);
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      .login-container {
        padding: 30px 20px;
      }

      .title {
        font-size: 1.8rem;
      }

      .logo {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-plane"></i>
      </div>
      <h1 class="title">WASHMS</h1>
      <p class="subtitle">Aircraft Structural Health Monitoring System</p>
    </div>

    <form id="loginForm">
      <div class="form-group relative">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="email" placeholder="Email" class="input-field" required>
      </div>

      <div class="form-group relative">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" placeholder="Password" class="input-field" required>
      </div>

      <button type="submit" class="login-btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <p id="error" class="error-message">Login failed. Please try again.</p>
    </form>

    <div class="footer">
      © 2024 WASHMS | Aircraft Health Monitoring
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDAy7_BMNnjzVbzff7OhaIF1EgeqMwSNJM",
      authDomain: "washms-d671a.firebaseapp.com",
      databaseURL: "https://washms-d671a-default-rtdb.firebaseio.com/",
      projectId: "washms-d671a",
      storageBucket: "washms-d671a.appspot.com",
      messagingSenderId: "483267348948",
      appId: "1:483267348948:web:65cca888caa2f2dea92e41"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');

      // Clear error message
      error.style.display = 'none';

      signInWithEmailAndPassword(auth, email, password)
        .then(() => window.location.href = 'dashboard.html')
        .catch((err) => {
          console.error(err);
          error.style.display = 'block';
        });
    });
  </script>
</body>
</html>
